
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fripouille 🐈</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/cat.png">

    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/fluency/192/cat.png">

    <meta name="theme-color" content="#4CAF50">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="container">
    <h2>Fripouille 🐾</h2>

    <div class="form-group">
        <input type="date" id="dateInput">
        <input type="number" id="weightInput" step="0.1" placeholder="Poids (kg)">
        <button id="btn-ajouter" onclick="addData()">Ajouter le poids</button>
    </div>

    <div class="chart-container">
        <canvas id="weightChart"></canvas>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Poids (kg)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="button_bas">
      <button class="btn-danger" onclick="clearData()">Effacer tout</button>
    </div>
</div>



</body>
</html>
